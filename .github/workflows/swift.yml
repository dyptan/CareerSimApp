# This workflow builds the CareersApp Xcode project.
# CareersApp is an Xcode app project, not a SwiftPM package, so it uses
# xcodebuild rather than `swift build`.
#
# Code signing is disabled because GitHub-hosted runners don't carry an
# Apple developer certificate; signing the .app at the end of the build
# would otherwise fail with exit code 65.
#
# The CareersAppTests target holds the unit tests (career-graph invariants
# and the venture-launch lifecycle). It deploys to macOS 13.0, which matches
# the runner, so the test step below runs it after the build.
#
# xcodebuild output is teed to a log file and piped through xcbeautify
# (github-actions renderer). On failure the tail of the log is emitted
# as a ::error:: block so the real xcodebuild error surfaces on the run
# summary even when the per-step logs aren't easily reachable.

name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Show Xcode version
      run: xcodebuild -version

    - name: Install xcbeautify
      run: brew install xcbeautify

    - name: Build
      id: build
      run: |
        set -o pipefail
        xcodebuild \
          -project CareersApp.xcodeproj \
          -scheme CareersApp \
          -destination 'generic/platform=macOS' \
          -configuration Debug \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          build \
          2>&1 | tee build.log | xcbeautify --renderer github-actions

    - name: Surface build log tail on failure
      if: failure() && steps.build.conclusion == 'failure'
      run: |
        echo "::group::xcodebuild tail (build.log)"
        tail -n 120 build.log || true
        echo "::endgroup::"
        echo "::error title=xcodebuild build failed::$(grep -E '^(error:|.*: error:)' build.log | tail -n 5 | tr '\n' ' ' || echo 'see log tail above')"

    - name: Test
      id: test
      run: |
        set -o pipefail
        xcodebuild \
          -project CareersApp.xcodeproj \
          -scheme CareersApp \
          -destination 'platform=macOS' \
          -configuration Debug \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          test \
          2>&1 | tee test.log | xcbeautify --renderer github-actions

    - name: Surface test log tail on failure
      if: failure() && steps.test.conclusion == 'failure'
      run: |
        echo "::group::xcodebuild tail (test.log)"
        tail -n 200 test.log || true
        echo "::endgroup::"
        echo "::error title=xcodebuild test failed::$(grep -E 'error:|failed|Assertion|Fatal error|crash' test.log | tail -n 8 | tr '\n' ' ' || echo 'see log tail above')"

    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: xcodebuild-logs
        path: |
          build.log
          test.log
        if-no-files-found: ignore
