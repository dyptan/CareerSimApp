# This workflow builds and tests the CareersApp Xcode project.
# CareersApp is an Xcode app project, not a SwiftPM package, so it uses
# xcodebuild rather than `swift build` / `swift test`.

name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Show Xcode version
      run: xcodebuild -version

    - name: Build
      run: |
        xcodebuild \
          -project CareersApp.xcodeproj \
          -scheme CareersApp \
          -destination 'platform=macOS' \
          -configuration Debug \
          build

    - name: Run tests
      run: |
        xcodebuild \
          -project CareersApp.xcodeproj \
          -scheme CareersApp \
          -destination 'platform=macOS' \
          -configuration Debug \
          test
