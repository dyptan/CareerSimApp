# This workflow builds and tests the CareersApp Xcode project.
# CareersApp is an Xcode app project, not a SwiftPM package, so it uses
# xcodebuild rather than `swift build` / `swift test`.
#
# Code signing is disabled because GitHub-hosted runners don't carry an
# Apple developer certificate; signing the .app at the end of the build
# would otherwise fail with exit code 65.
#
# xcodebuild output is piped through xcbeautify with the github-actions
# renderer so Swift compile errors surface as ::error file=... line=...::
# annotations on the run summary, instead of being buried in raw logs.

name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Show Xcode version
      run: xcodebuild -version

    - name: Install xcbeautify
      run: brew install xcbeautify

    - name: Build
      run: |
        set -o pipefail
        xcodebuild \
          -project CareersApp.xcodeproj \
          -scheme CareersApp \
          -destination 'generic/platform=macOS' \
          -configuration Debug \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          build \
          | xcbeautify --renderer github-actions

    - name: Run tests
      run: |
        set -o pipefail
        xcodebuild \
          -project CareersApp.xcodeproj \
          -scheme CareersApp \
          -destination 'platform=macOS' \
          -configuration Debug \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          test \
          | xcbeautify --renderer github-actions
